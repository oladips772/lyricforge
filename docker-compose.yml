version: "3.9"

services:
  lyricforge:
    build: .
    container_name: lyricforge
    restart: unless-stopped
    ports:
      - "8010:8000"   # expose on port 8010 on your VPS
    volumes:
      - ./outputs:/app/outputs   # persist rendered videos
      - ./temp:/app/temp
      - whisper_cache:/root/.cache/huggingface  # cache Whisper model
    env_file:
      - .env
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-base}

volumes:
  whisper_cache:
